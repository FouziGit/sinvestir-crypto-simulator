# Déploiement Netlify — export statique Next.js (output: "export").
# Aucune fonction serverless : le dossier `out/` est servi tel quel.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

# Autorise l'embarquement iframe cross-origin de la route /embed.
[[headers]]
  for = "/embed"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *;"

[[headers]]
  for = "/embed/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *;"
